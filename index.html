<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Projeto Integrador com o tema: Loja de Jogos Online">
    <meta name="keywords" content="videogames,digital, xbox,playstation,pc,nintendo-switch,">
    <title>Medieval Gaming</title>
    <link rel="icon" type="image/png" href="icone/dragao.ico">
    <link rel="stylesheet" href="casa.css">
</head>
<body>
    <!-- barra no topo da pagina, versão da página inicial -->
    <header id="inicio">
        <div id="logo"><img src="" alt="logo da Medieval Gaming"></div>
        <div id="pc"><input type="checkbox" value="PC"></div>
        <div id="playstation"><input type="checkbox" value="playstation"></div>
        <div id="xbox"><input type="checkbox" value="xbox"></div>
        <div id="nintendo-switch"><input type="checkbox" value="nintendo-switch"></div>
        <div id="barra-pesquisa">
            <!-- AQUI VAI UMA BARRA DE PESQUISA
            A FORMATACAO VAI SER UMA BORDA FINA, COM O BACKGROUND FEITO EM UMA UM POUCO MAIS CLARA DO QUE A COR
            AO REDOR DA BARRA DA PESQUISA,-->
            <input type="text" id="barra-pesquisa2">
        </div>
            <!-- AQUI VAI UM BOTAO DE PESQUISA, COM O ICONE DE LUPA, O BOTAO VAI SER DO MESMO TAMANHO DA BARRA DE PESQUISA, E VAI FICAR AO LADO DIREITO DELA -->
        <div id="botao-pesquisa"><img src="icone/lupa.png" alt="botão de pesquisa"></div>
        <div id="carrinho"><img src="icone/carrinho.png" alt="carrinho de compras"></div>
        <div id="sacola"><img src="icone/sacola.png" alt="sacola"></div>
        <div id="contato"><img src="icone/contato.png" alt="contato"></div>
        <div id="configuracoes"><img src="icone/configuracoes.png" alt="configurações"></div>
        <div id="sair"><img src="icone/sair.png" alt="sair"></div>
    </header>
        <div class="filters">
            <button onclick="filtrar('todos')">Todos</button>
            <button onclick="filtrar('artigos')">Artigos</button>
            <button onclick="filtrar('videos')">Vídeos</button>
            <button onclick="filtrar('podcasts')">Podcasts</button>
            
            <button class="frutiger-button">
              <div class="inner">
                <div class="top-white"></div>
                <span class="text">playstation</span>
              </div>
            </button>
        </div>    
        <!-- From Uiverse.io by SelfMadeSystem --> 



    <!-- area do usuario -->
        <div id="usuario">
            <link rel="stylesheet" href="">
        </div>
    <!-- Cards de conteúdo -->
        <div class="container" id="conteudo">
        <div class="card" data-tipo="artigos">
            <img src="https://via.placeholder.com/300x150" alt="Imagem">
        <div class="content">
            <h3>Título do Artigo</h3>
            <p>Descrição breve do conteúdo...</p>
        </div>
        </div>
        <div class="card" data-tipo="videos">
        <img src="https://via.placeholder.com/300x150" alt="Imagem">
            <div class="content">
                <h3>Vídeo Interessante</h3>
                <p>Resumo do vídeo...</p>
            </div>
        </div>    
    </header>
    
    
    <main>

        <div id="destaque">
            <link rel="stylesheet" href="">
        </div>
        <div>
            <h1>Popular</h1>
            <link rel="stylesheet" href=""><img src="" alt=""></link>
        </div>
        <div>
            <h2>mais vendidos</h2>
            <link rel="stylesheet" href=""><img src="" alt=""></link>
        </div>
        <div>
            <h3>categorias</h3>
            <link rel="stylesheet" href=""><img src="" alt=""></link>
        </div>
    </main>
</body>
<footer>
